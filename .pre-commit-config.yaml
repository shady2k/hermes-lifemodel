# Pre-commit hooks mirror the `make check` gate (ruff-format, ruff, mypy).
# Install once with `uv run pre-commit install`; run on demand with
# `uv run pre-commit run --all-files`. Revs are pinned to the versions in uv.lock.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--strict]
        files: ^src/
